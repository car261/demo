version: '3.8'

services:
  backend:
    build: .
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - redis
    environment:
      # Point backend to Docker service names instead of localhost
      MONGO_URI: mongodb://mongo:27017/chatgpt_clone
      REDIS_HOST: redis

  mongo:
    image: mongo
    restart: unless-stopped
    ports:
      - "27017:27017"

  redis:
    image: redis
    restart: unless-stopped
    ports:
      - "6379:6379"